<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f5c542"/>
      <stop offset="100%" stop-color="#d4a22a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border glow -->
  <rect width="504" height="504" x="4" y="4" rx="104" fill="none" stroke="#d4a22a" stroke-opacity="0.2" stroke-width="4"/>
  <!-- Archive icon scaled to fit (24x24 viewBox -> 512 canvas, centered with padding) -->
  <g transform="translate(116, 116) scale(11.67)" fill="none" stroke="url(#amber)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Box body (drawn first so lid renders on top) -->
    <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/>
    <!-- Center line -->
    <path d="M10 12h4"/>
    <!-- Lid (drawn last = highest layer) -->
    <rect width="20" height="5" x="2" y="3" rx="1" fill="url(#amber)" fill-opacity="0.15"/>
  </g>
</svg>
